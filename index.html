<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Consumo de Agua – Envasado</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#030C18;--bg1:#061120;--bg2:#0A1A2E;--bg3:#0F2040;
  --blue:#1F6FEB;--green:#6BBF00;--yellow:#E3B341;--red:#F85149;--teal:#39C5BB;
  --txt:#E6EDF3;--txt2:#8B949E;--txt3:#3D5068;--border:#1C2E40;
  --lab:#6E2630;--past:#0074AA;--blanda:#FFB800;--lac:#800080;--bbvac:#166866;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg0);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── HEADER ROW 1 ── */
.hdr{background:linear-gradient(135deg,#040E1C,#061726 50%,#040E1C);
  border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;padding:5px 18px 4px;
  position:sticky;top:0;z-index:100;box-shadow:0 4px 24px #00000050;}
.hdr-r1{display:flex;align-items:center;gap:12px;flex-wrap:nowrap;padding-bottom:5px;}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-ico{width:36px;height:36px;background:linear-gradient(135deg,#1F6FEB,#39C5BB);
  border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.hdr-title h1{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;}
.hdr-title p{font-size:8px;color:var(--teal);letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
.sep{width:1px;height:30px;background:var(--border);flex-shrink:0;}
.btn-dl{cursor:pointer;background:#0C1320;border:1px solid #238636;color:#6BBF00;
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;
  display:flex;align-items:center;gap:4px;text-decoration:none;white-space:nowrap;font-weight:700;transition:all .15s;}
.btn-dl:hover{background:#1a2f1a;}
.btn-ul{cursor:pointer;background:#0C1320;border:1px solid #1C4E7A;color:#58A6FF;
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;
  display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:700;transition:all .15s;}
.btn-ul:hover{background:#0d1f33;}
#refreshStatus{font-size:8px;font-family:'JetBrains Mono',monospace;color:#8B949E;
  padding:3px 8px;background:var(--bg3);border:1px solid #1F6FEB40;border-radius:4px;white-space:nowrap;}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── HEADER ROW 2: FILTROS FULL WIDTH ── */
.hdr-r2{display:flex;align-items:flex-end;gap:6px;width:100%;padding-top:4px;border-top:1px solid var(--border);}
.fg{display:flex;flex-direction:column;gap:3px;flex:1;min-width:80px;}
.fg label{font-size:8px;color:var(--txt2);letter-spacing:1px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:4px;}
.fg select,.fg input[type=date]{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--txt);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 8px;border-radius:5px;
  outline:none;cursor:pointer;transition:border .15s;}
.fg select:hover,.fg input:hover,.fg select:focus{border-color:var(--blue);}
.btn-rst{flex-shrink:0;background:transparent;border:1px solid var(--border);color:var(--txt3);
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;
  cursor:pointer;transition:all .15s;align-self:flex-end;}
.btn-rst:hover{border-color:var(--red);color:var(--red);}

/* ── TABS ── */
.eq-tabs{display:flex;gap:4px;background:var(--bg1);padding:6px 18px;
  border-bottom:1px solid var(--border);overflow-x:auto;}
.eq-tab{padding:5px 14px;border-radius:6px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;border:1px solid transparent;
  transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px;}
.eq-tab:hover{background:var(--bg3);}
.eq-tab.active{border-color:currentColor;background:var(--bg3);}
.eq-tab[data-eq="ALL"]{color:var(--txt2);}
.eq-tab[data-eq="LAB"]{color:var(--lab);}
.eq-tab[data-eq="PAST"]{color:var(--past);}
.eq-tab[data-eq="BLANDA"]{color:var(--blanda);}
.eq-tab[data-eq="LAC"]{color:var(--lac);}
.eq-tab[data-eq="BBVac"]{color:var(--bbvac);}
.eq-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

/* ── MAIN ── */
.main{padding:12px 18px;display:flex;flex-direction:column;gap:12px;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(128px,1fr));gap:8px;}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:10px 12px;position:relative;overflow:hidden;transition:transform .15s;}
.kpi:hover{transform:translateY(-1px);}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent,var(--blue));}
.kpi-label{font-size:7px;color:var(--txt3);letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--accent,var(--txt));line-height:1;}
.kpi-unit{font-size:10px;color:var(--txt2);margin-left:2px;}
.kpi-sub{font-size:8px;color:var(--txt3);margin-top:3px;font-family:'JetBrains Mono',monospace;}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px;}
.chart-card.wide{grid-column:1/-1;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);}
.card-title::before{content:'│ ';color:var(--accent,var(--blue));}
.card-note{font-size:8px;color:var(--txt3);font-family:'JetBrains Mono',monospace;}
.chart-wrap{position:relative;height:210px;}
.chart-wrap.tall{height:270px;}
.chart-wrap.sm{height:175px;}
.dc-center{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;}
.dc-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--txt);line-height:1;}
.dc-lbl{font-size:9px;color:var(--txt3);font-family:'JetBrains Mono',monospace;margin-top:3px;display:block;}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead th{background:var(--bg3);color:var(--txt2);padding:5px 8px;text-align:left;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--bg3);}
tbody td{padding:4px 8px;font-family:'JetBrains Mono',monospace;font-size:9px;}
.plan-card{background:linear-gradient(135deg,#0A1A2E,#061120);border:1px solid var(--border);border-radius:7px;padding:12px;}
.plan-card.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px 20px;min-height:240px;border:1px dashed #1A5C2E;}
.plan-badge{width:48px;height:48px;background:transparent;border:2px solid var(--green);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--green);margin-bottom:12px;}
.plan-hero-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
  letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.plan-hero-sub{font-size:11px;color:var(--txt2);margin-bottom:16px;line-height:1.5;}
.plan-btn-hero{background:transparent;border:1px solid var(--green);color:var(--green);
  font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 20px;border-radius:5px;
  cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;}
.plan-btn-hero:hover{background:var(--green);color:#000;}
.plan-footer{font-size:9px;color:var(--txt3);font-family:'JetBrains Mono',monospace;border:1px dashed #1A5C2E;
  border-radius:4px;padding:4px 12px;}
.plan-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.plan-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);}
.plan-btn{background:transparent;border:1px solid var(--teal);color:var(--teal);
  font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:4px;
  cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:4px;}
.plan-btn:hover{background:var(--teal);color:#000;}
.plan-items{display:flex;flex-direction:column;gap:7px;}
.plan-item{display:flex;gap:8px;padding:7px;background:var(--bg3);border-radius:5px;border-left:3px solid var(--accent,var(--blue));}
.plan-ico{font-size:14px;flex-shrink:0;margin-top:1px;}
.plan-text strong{display:block;font-size:10px;color:var(--txt);margin-bottom:2px;}
.plan-text span{font-size:9px;color:var(--txt2);}
.insight{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px;display:flex;gap:8px;}
.ins-ico{font-size:16px;flex-shrink:0;}
.ins-text strong{font-size:9px;color:var(--txt2);display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:1px;}
.ins-text span{font-size:10px;color:var(--txt);}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr;}.chart-card.wide{grid-column:auto;}}
</style>
</head>

<header class="hdr">
  <!-- FILA 1: Logo | Botones | Status -->
  <div class="hdr-r1">
    <div class="hdr-logo">
      <div class="hdr-ico">💧</div>
      <div class="hdr-title">
        <h1>Control de Consumo de Agua</h1>

  <!-- FILA 2: FILTROS FULL WIDTH -->

    <div class="fg">

    </div>
    <div class="fg">
      <label>Semana</label>
      <select id="fSem"><option value="">Todas</option></select>
    </div>
    <div class="fg">
      <label>Formato</label>
      <select id="fFmt"><option value="">Todos</option></select>
    </div>
    <div class="fg">
      <label>Equipo</label>

        <option value="BLANDA">Agua Blanda</option>
        <option value="LAC">Lav. Cajas</option>
        <option value="BBVac">Bomba Vacío</option>
      </select>
    </div>
    <div class="fg">
      <label>Turno</label>
      <select id="fTurno"><option value="">Todos</option><option>T1</option><option>T2</option><option>T3</option></select>
    </div>
    <button class="btn-rst" onclick="resetFiltros()">↺ Limpiar</button>
    <span id="refreshStatus2" style="margin-left:auto;font-size:8px;font-family:'JetBrains Mono',monospace;color:#8B949E;padding:3px 10px;background:var(--bg3);border:1px solid #1F6FEB40;border-radius:4px;flex-shrink:0;white-space:nowrap;"></span>
  </div>
</header>

<!-- TABS -->
<div class="eq-tabs">
  <div class="eq-tab active" data-eq="ALL" onclick="selTab(this,'ALL')"><div class="eq-dot" style="background:#8B949E"></div>General</div>
  <div class="eq-tab" data-eq="LAB"    onclick="selTab(this,'LAB')"><div class="eq-dot"></div>Lav. Botellas</div>
  <div class="eq-tab" data-eq="PAST"   onclick="selTab(this,'PAST')"><div class="eq-dot"></div>Pasteurizador</div>
  <div class="eq-tab" data-eq="BLANDA" onclick="selTab(this,'BLANDA')"><div class="eq-dot"></div>Agua Blanda</div>
  <div class="eq-tab" data-eq="LAC"    onclick="selTab(this,'LAC')"><div class="eq-dot"></div>Lav. Cajas</div>
  <div class="eq-tab" data-eq="BBVac"  onclick="selTab(this,'BBVac')"><div class="eq-dot"></div>Bomba Vacío</div>
</div>

<main class="main" id="main"></main>

function loadExcel(input){

        // Normalize all keys: trim spaces
        const norm = {};

          fv = `${y}-${mo}-${d}`;

          fv = String(fv).trim().slice(0,10);

        if(!fv || fv.length < 8) continue;

        // Get turno
        const turno = String(norm['Turno'] || norm['turno'] || '').trim();
        if(!turno) continue;

        // Get mes - capitalize first letter
        const mesRaw = String(norm['Mes'] || norm['mes'] || '').trim();
        const mes = mesRaw.charAt(0).toUpperCase() + mesRaw.slice(1).toLowerCase();

        // Get sem
        const sem = parseInt(norm['Sem'] || norm['sem'] || 0) || 0;

        // Get formato
        const formato = String(norm['Formato'] || norm['formato'] || '').trim();

        // Get consumos - try both 'M. LAB' and 'M.LAB' variants
        const getVal = (...keys) => {
          for(const k of keys){
            const v = norm[k];
            if(v !== null && v !== undefined && v !== '') {
              const n = parseFloat(v);
              if(!isNaN(n)) return n;
            }
          }
          return 0;
        };

        const lab    = getVal('M. LAB',  'M.LAB',   'M.Lab');
        const past   = getVal('M.PAST',  'M. PAST', 'M.Past');
        const blanda = getVal('M. BLANDA','M.BLANDA','M.Blanda');
        const lac    = getVal('M. LAC',  'M.LAC',   'M.Lac');
        const bbvac  = getVal('M. BBVac','M.BBVac', 'M.BBVAC');

        // Skip rows with negative values (formula artifact) or all zeros
        if(lab < 0 || past < 0 || blanda < 0 || lac < 0 || bbvac < 0) continue;
        const total = lab + past + blanda + lac + bbvac;
        if(total === 0) continue;

        parsed.push({fecha:fv, mes, sem, turno, formato, LAB:lab, PAST:past, BLANDA:blanda, LAC:lac, BBVac:bbvac, total});
      }

      if(parsed.length > 0){
        RAW = parsed;
        try { await window.storage.set('agua_raw', JSON.stringify(RAW), true); } catch(e){}
        updateStatus();
        populateSemanas();
        populateFormatos();
        render();
      } else {
        alert('No se encontraron datos válidos. Verifica que el archivo tenga la hoja "Data" con columnas M. LAB, M.PAST, M. BLANDA, M. LAC, M. BBVac.');
      }
    } catch(err){ alert('Error al leer el archivo: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function updateStatus(){
  const fechas = RAW.map(r=>r.fecha).sort();
  const ultima = fechas.length > 0 ? fechas[fechas.length-1] : null;
  const primera = fechas.length > 0 ? fechas[0] : null;
  const st = RAW.length > 0
    ? `📅 ${primera} → <b style="color:#6BBF00">${ultima}</b> &nbsp;|&nbsp; ${RAW.length} reg.`
    : 'Sin datos — carga el Excel para actualizar';
  const s1 = document.getElementById('refreshStatus');
  const s2 = document.getElementById('refreshStatus2');
  if(s1) s1.innerHTML = st;
  if(s2) s2.innerHTML = st;
}

// ── FILTROS ──────────────────────────────────────────────────────────────
function gf(){
  const mes   = document.getElementById('fMes').value;
  const sem   = document.getElementById('fSem').value;
  const turno = document.getElementById('fTurno').value;
  const fmt   = document.getElementById('fFmt').value;
  const eq    = document.getElementById('fEq').value;
  const desde = document.getElementById('fDesde').value;
  const hasta = document.getElementById('fHasta').value;
  return RAW.filter(r =>
    r.total > 0 &&
    (!desde  || r.fecha >= desde) &&
    (!hasta  || r.fecha <= hasta) &&
    (!mes    || r.mes === mes) &&
    (!sem    || r.sem == sem) &&
    (!turno  || r.turno === turno) &&
    (!fmt    || r.formato === fmt) &&
    (!eq     || r[eq] > 0)
  );
}
function populateSemanas(){
  const mes = document.getElementById('fMes').value;
  const sel = document.getElementById('fSem');
  const cur = sel.value;
  while(sel.options.length > 1) sel.remove(1);
  [...new Set(RAW.filter(r => !mes || r.mes === mes).map(r => r.sem))].sort((a,b)=>a-b).forEach(s=>{
    const o = document.createElement('option'); o.value = s; o.text = 'Sem ' + s; sel.appendChild(o);
  });
  if([...sel.options].some(o => o.value == cur)) sel.value = cur;
}
function populateFormatos(){
  const sel = document.getElementById('fFmt');
  const cur = sel.value;
  while(sel.options.length > 1) sel.remove(1);
  [...new Set(RAW.map(r => r.formato).filter(Boolean))].sort().forEach(f=>{
    const o = document.createElement('option'); o.value = f; o.text = f; sel.appendChild(o);
  });
  if([...sel.options].some(o => o.value === cur)) sel.value = cur;
}
function resetFiltros(){
  ['fMes','fSem','fTurno','fFmt','fEq'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDesde').value = '2026-01-01';
  document.getElementById('fHasta').value = '2026-12-31';

}

      <div class="card-hdr"><span class="card-title" style="--accent:${col}">Tendencia Diaria – ${name} (m³)</span>
        <span class="card-note">${diasArr.length} días</span></div>
      <div class="chart-wrap tall"><canvas id="cEqD"></canvas></div>
    </div>
  </div>
  <div class="charts-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="chart-card">
      <div class="card-hdr"><span class="card-title" style="--accent:${col}">Por Turno</span></div>
      <div class="chart-wrap sm" style="position:relative">
        <canvas id="cEqT"></canvas>
        <div class="dc-center"><div class="dc-val" style="color:${col}">${fmt(totalEq)}</div><div class="dc-lbl">m³</div></div>
      </div>
    </div>
    <div class="chart-card">
      <div class="card-hdr"><span class="card-title" style="--accent:${col}">Por Mes</span></div>
      <div class="chart-wrap sm"><canvas id="cEqM"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="card-hdr"><span class="card-title" style="--accent:${col}">vs Otros Equipos</span></div>
      <div class="chart-wrap sm" style="position:relative">
        <canvas id="cEqV"></canvas>
        <div class="dc-center"><div class="dc-val" style="font-size:14px;color:${col}">${(totalG>0?totalEq/totalG*100:0).toFixed(1)}%</div><div class="dc-lbl">del total</div></div>
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1.8fr;gap:12px">
    <div class="plan-card hero" style="--accent:${col}">
      <div class="plan-badge">PR</div>
      <div class="plan-hero-title">Plan de Reacción</div>
      <div class="plan-hero-sub">Procedimiento ante desviaciones de consumo<br>${name}</div>
      ${PLAN[eq]&&PLAN[eq]!=='#'
        ? `<a class="plan-btn-hero" href="${PLAN[eq]}" target="_blank">↗ Abrir Plan</a>`
        : `<span style="color:var(--txt3);font-size:10px;font-family:'JetBrains Mono',monospace;padding:8px 16px;border:1px dashed #3D5068;border-radius:5px;">Sin plan asignado</span>`}
      <div class="plan-footer">SPLAN · AB InBev · ${name}</div>
    </div>
    <div class="plan-card">
      <div class="plan-hdr"><span class="plan-title" style="color:${col}">⚡ Acciones de Control</span></div>
      <div class="plan-items">${buildPlanEq(eq,col,name,totalEq,totalG,porT,topT,topDia)}</div>
    </div>
  </div>
  <div class="chart-card">
    <div class="card-hdr"><span class="card-title" style="--accent:${col}">Top 10 Días Mayor Consumo</span></div>
    ${buildTopDias(diasArr,col)}
  </div>`;

  setTimeout(()=>{
  // Tendencia diaria
  dc('ed');
  const TCOL={'T1':'#6BBF00','T2':'#2E9E6B','T3':'#1A7A50'};
  const indVal = EQIND[eq];
  // Barras agrupadas por turno, color verde<=target rojo>target
  // Tonalidades de verde por turno; rojo si supera target
  const TGREEN = {'T1':'#6BBF00','T2':'#2E9E6B','T3':'#1A7A50'};
  const mkDataset = (t) => {
    const vals = diasArr.map(d=>d[t]||0);
    const bg = vals.map(v => {
      if(v===0) return 'transparent';
      if(indVal && v > indVal) return '#F85149CC';
      return TGREEN[t]+'CC';
    });
    return {label:t, data:vals,
      backgroundColor:bg, borderColor:bg.map(c=>c.slice(0,7)+'FF'),
      borderWidth:0, borderRadius:2};
  };
  CHARTS.ed=new Chart(document.getElementById('cEqD').getContext('2d'),{type:'bar',
    data:{labels:diasArr.map(d=>d.fecha.slice(5)),
      datasets:[mkDataset('T1'),mkDataset('T2'),mkDataset('T3')]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#8B949E',font:{family:'JetBrains Mono',size:9},usePointStyle:true,padding:12}},
        tooltip:{...TT,mode:'index',callbacks:{
          title:it=>it[0].label,
          label:it=>it.raw>0?` ${it.dataset.label}: ${it.raw} m³`:null,
          footer:items=>{
            const tot=items.reduce((a,b)=>a+(b.raw||0),0);
            const r=[`Total día: ${tot} m³`];
            if(indVal) r.push(`Indicador/turno: ${indVal} m³`);
            return tot>0?r:[];
          }
        }},
        annotation: indVal ? {annotations:{
          lineaMeta:{type:'line',yMin:indVal,yMax:indVal,
            borderColor:'#6BBF00BB',borderWidth:1.5,borderDash:[5,4],
            label:{content:`IND ${indVal} m³`,display:true,position:'end',
              font:{size:9,family:'JetBrains Mono'},color:'#6BBF00',
              backgroundColor:'rgba(10,26,46,0.85)',padding:{x:6,y:3}}}
        }} : {}
      },
      scales:{
        x:{grid:GR,ticks:{...TK,maxTicksLimit:22}},
        y:{grid:GR,ticks:{...TK,callback:v=>v+'m³'},min:0}
      }
    }
  });

  // Turno donut
  dc('et');
  CHARTS.et=new Chart(document.getElementById('cEqT').getContext('2d'),{type:'doughnut',
    data:{labels:['T1','T2','T3'],datasets:[{data:['T1','T2','T3'].map(t=>porT[t]),
      backgroundColor:['#6BBF00EE','#2E9E6BEE','#1A7A50EE'],
      borderColor:['#6BBF00','#2E9E6B','#1A7A50'],
      borderWidth:2,hoverOffset:10,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'70%',
      rotation:-120,circumference:300,
      plugins:{legend:{position:'bottom',labels:{color:'#C0C8D4',font:{family:'JetBrains Mono',size:9},usePointStyle:true,padding:8}},
        tooltip:{...TT,callbacks:{label:it=>` ${it.label}: ${it.raw} m³`}}}}});

  // Mes barras
  dc('em');
  const mesVals=meses.map(m=>sum(data.filter(r=>r.mes===m),eq));
  const maxM=Math.max(...mesVals);
  CHARTS.em=new Chart(document.getElementById('cEqM').getContext('2d'),{type:'bar',
    data:{labels:meses,datasets:[{label:name,data:mesVals,
      backgroundColor:mesVals.map(v=>v===maxM?col:col+'44'),
      borderColor:mesVals.map(v=>v===maxM?col:col+'88'),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:it=>` ${it.raw} m³`}}},
      scales:{x:{grid:GR,ticks:TK},y:{grid:GR,ticks:{...TK,callback:v=>v+'m³'}}}}});

  // vs otros (donut con highlight)
  dc('ev');
  CHARTS.ev=new Chart(document.getElementById('cEqV').getContext('2d'),{type:'doughnut',
    data:{labels:EQ.map(e=>EQNAME[e]),datasets:[{data:EQ.map(e=>allEqT[e]),
      backgroundColor:EQ.map(e=>e===eq?EQCOL[e]+'EE':EQCOL[e]+'22'),
      borderColor:EQ.map(e=>e===eq?EQCOL[e]:'transparent'),borderWidth:2,hoverOffset:6}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:it=>` ${it.label}: ${it.raw} m³`}}}}});
  }, 0);
}


function buildTopDias(diasArr,col){
  const TCOL={'T1':'#6BBF00','T2':'#2E9E6B','T3':'#1A7A50'};
  const top=[...diasArr].sort((a,b)=>b.val-a.val).slice(0,10);
  const maxV=top[0]?top[0].val:1;
  let h='<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>Fecha</th><th>Turno</th><th>m³</th><th style="width:35%">Barra</th></tr></thead><tbody>';
  top.forEach((d,i)=>{h+=`<tr>
    <td style="color:${i<3?'#F85149':'var(--txt3)'}">${i+1}</td>
    <td>${d.fecha}</td>
    <td><span style="color:${TCOL[d.turno]||col};font-weight:700">${d.turno}</span></td>
    <td style="color:${TCOL[d.turno]||col};font-weight:600">${d.val}</td>
    <td><div style="height:7px;background:${TCOL[d.turno]||col}${i<3?'CC':'66'};border-radius:3px;width:${(d.val/maxV*100).toFixed(0)}%"></div></td>
  </tr>`;});
  return h+'</tbody></table></div>';
}
function buildPlanEq(eq,col,name,totalEq,totalG,porT,topT,topDia){
  return [
    {ico:'⚠️',col,t:`Consumo ${fmt(totalEq)} m³ · IND objetivo: ${EQIND[eq]??'-'}`,
     d:`Representa el ${(totalG>0?totalEq/totalG*100:0).toFixed(1)}% del total. Verificar fugas y tiempos de operación.`},
    {ico:'🔄',col:topT==='T3'?'#F85149':topT==='T2'?'#2D7DD2':'#6BBF00',t:`Turno ${topT} con mayor consumo`,
     d:`${fmt(porT[topT])} m³. Comparar con turno de menor consumo e investigar diferencia.`},
    {ico:'📈',col:'#39C5BB',t:'Día pico detectado',
     d:`${topDia?topDia.fecha+' — '+topDia.val+' m³':'-'}. Investigar causa: paros, re-procesos o fugas.`},
    {ico:'✅',col:'#6BBF00',t:'Acción correctiva',
     d:'Si supera el indicador objetivo en un turno, escalar a supervisor y registrar en bitácora.'},
  ].map(i=>`<div class="plan-item" style="--accent:${i.col}">
    <div class="plan-ico">${i.ico}</div><div class="plan-text"><strong>${i.t}</strong><span>${i.d}</span></div>
  </div>`).join('');
}

// (render is called by the async IIFE above)
</script>
</body>
</html>
